<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Icon Preview — Gauntlet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    color: #fff;
    gap: 40px;
  }

  h1 {
    font-size: 24px;
    font-weight: 500;
    opacity: 0.7;
  }

  .icon-container {
    position: relative;
    width: 1024px;
    height: 1024px;
  }

  .icon-container img {
    width: 1024px;
    height: 1024px;
    display: block;
  }

  /* iOS uses a superellipse (squircle), not a simple border-radius.
     The exact iOS mask is a continuous-curvature shape with ~22.37% corner radius.
     We use an SVG clipPath with the precise iOS superellipse path for accuracy. */
  .icon-container img {
    clip-path: url(#ios-squircle);
  }

  .label {
    font-size: 16px;
    opacity: 0.4;
    margin-top: -20px;
  }

  /* Scaled-down previews */
  .previews {
    display: flex;
    gap: 60px;
    align-items: end;
  }

  .preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .preview img {
    clip-path: url(#ios-squircle);
  }

  .preview span {
    font-size: 14px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<h1>iOS App Icon Preview</h1>

<div class="icon-container">
  <img src="gauntlet-app-icon.png" alt="Gauntlet App Icon" />
</div>
<div class="label">1024 &times; 1024 — App Store</div>

<div class="previews">
  <div class="preview">
    <img src="gauntlet-app-icon.png" alt="180px" width="180" height="180" />
    <span>180px — iPhone @3x</span>
  </div>
  <div class="preview">
    <img src="gauntlet-app-icon.png" alt="120px" width="120" height="120" />
    <span>120px — iPhone @2x</span>
  </div>
  <div class="preview">
    <img src="gauntlet-app-icon.png" alt="60px" width="60" height="60" />
    <span>60px — Home Screen</span>
  </div>
</div>

<!-- iOS Superellipse clip path.
     This is the precise continuous-curvature (squircle) shape Apple uses,
     not a simple rounded rectangle. The corner radius is ~22.37% of the icon size.
     Path generated from Apple's HIG icon mask specification. -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <clipPath id="ios-squircle" clipPathUnits="objectBoundingBox">
      <path d="
        M 0.5 0
        C 0.776 0, 0.864 0, 0.918 0.0273
        C 0.959 0.0478, 0.9522 0.0478, 0.9727 0.082
        C 1 0.136, 1 0.224, 1 0.5
        C 1 0.776, 1 0.864, 0.9727 0.918
        C 0.9522 0.9522, 0.9522 0.9522, 0.918 0.9727
        C 0.864 1, 0.776 1, 0.5 1
        C 0.224 1, 0.136 1, 0.082 0.9727
        C 0.0478 0.9522, 0.0478 0.9522, 0.0273 0.918
        C 0 0.864, 0 0.776, 0 0.5
        C 0 0.224, 0 0.136, 0.0273 0.082
        C 0.0478 0.0478, 0.0478 0.0478, 0.082 0.0273
        C 0.136 0, 0.224 0, 0.5 0
        Z
      " />
    </clipPath>
  </defs>
</svg>

</body>
</html>
