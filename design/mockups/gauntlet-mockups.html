<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gauntlet — UI/UX Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   GAUNTLET DESIGN SYSTEM — CSS CUSTOM PROPERTIES
   ═══════════════════════════════════════════ */

:root {
  /* Primary Brand */
  --ember: #C0392B;
  --ember-bright: #E74C3C;
  --ember-deep: #962D22;

  /* Core Accents */
  --molten: #E8751A;
  --gauntlet-gold: #C9982A;
  --white-fire: #F0D9A0;
  --cooled-steel: #7A8A9A;

  /* Semantic / Status */
  --success: #4A9A6A;
  --warning: #D4872A;
  --error: #E74C3C;
  --info: #6888A8;

  /* Dark Neutrals */
  --void: #06060A;
  --obsidian: #0C0C12;
  --charcoal: #14141C;
  --graphite: #1E1E28;
  --slate: #2A2A38;
  --iron: #3A3A4A;

  /* Light Neutrals */
  --ash: #6B6B80;
  --silver: #9999AD;
  --mist: #C8C8D6;
  --bone: #E8E8EE;
  --white-hot: #F5F5F8;
  --pure: #FFFFFF;

  /* Rank Tier Colors */
  --rank-bronze: #8B6A4E;
  --rank-silver: #8C9BAA;
  --rank-gold: #C8A84E;
  --rank-platinum: #7BB8D4;
  --rank-diamond: #B8D4F0;
  --rank-titanium: #5A5A6A;
  --rank-obsidian: #C0392B;
}

/* ═══════════════════════
   RESET & BASE
   ═══════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: #08080E;
  color: var(--mist);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════
   IN-APP ATMOSPHERIC EFFECTS
   z-index: 0 keeps ALL atmosphere behind
   foreground content (cards, text, charts).
   Content gets z-index: 1 via .phone-screen > *
   ═══════════════════════════════════ */

/* All direct children of phone-screen that are actual content sit above atmosphere */
.phone-screen > *:not(.phone-screen-embers):not(.phone-screen-glow-bottom):not(.phone-screen-glow-side):not(.phone-screen-glow-left) {
  position: relative;
  z-index: 2;
}

/* Top ember glow — warm light source radiating down from behind status bar */
.phone-screen::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 350px;
  background:
    radial-gradient(ellipse 140% 280px at 50% -30px, rgba(192,57,43,0.22), transparent 65%),
    radial-gradient(ellipse 80% 150px at 30% 20px, rgba(232,117,26,0.08), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Subtle grid pattern overlay — fades in/out so it feels layered, not tiled */
.phone-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(58,58,74,0.10) 1px, transparent 1px),
    linear-gradient(90deg, rgba(58,58,74,0.10) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
  mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 8%, rgba(0,0,0,0.25) 40%, transparent 75%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 8%, rgba(0,0,0,0.25) 40%, transparent 75%);
}

/* Bottom ember glow — warm reflection rising from nav bar */
.phone-screen-glow-bottom {
  position: absolute;
  bottom: 50px;
  left: 0;
  right: 0;
  height: 250px;
  background:
    radial-gradient(ellipse 120% 200px at 50% 100%, rgba(192,57,43,0.12), transparent 65%),
    radial-gradient(ellipse 60% 120px at 70% 90%, rgba(232,117,26,0.06), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Floating ember particles — scattered warm sparks that drift gently */
.phone-screen-embers {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle 2px at 12% 18%, rgba(192,57,43,0.40), transparent 10px),
    radial-gradient(circle 1.5px at 82% 30%, rgba(232,117,26,0.35), transparent 8px),
    radial-gradient(circle 2px at 40% 65%, rgba(192,57,43,0.30), transparent 10px),
    radial-gradient(circle 1.5px at 72% 80%, rgba(201,152,42,0.28), transparent 8px),
    radial-gradient(circle 1px at 28% 48%, rgba(232,117,26,0.22), transparent 6px),
    radial-gradient(circle 2px at 88% 55%, rgba(150,45,34,0.35), transparent 10px),
    radial-gradient(circle 1.5px at 55% 12%, rgba(201,152,42,0.25), transparent 8px),
    radial-gradient(circle 1px at 18% 85%, rgba(192,57,43,0.20), transparent 6px),
    radial-gradient(circle 1.5px at 65% 42%, rgba(232,117,26,0.18), transparent 8px);
  animation: screenDrift 18s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes screenDrift {
  0% { transform: translateY(0) translateX(0); opacity: 0.7; }
  33% { transform: translateY(-6px) translateX(3px); opacity: 1; }
  66% { transform: translateY(3px) translateX(-4px); opacity: 0.85; }
  100% { transform: translateY(-3px) translateX(2px); opacity: 0.9; }
}

/* Asymmetric side glow — warm light leaking in from right edge */
.phone-screen-glow-side {
  position: absolute;
  top: 25%;
  right: 0;
  width: 120px;
  height: 350px;
  background: radial-gradient(ellipse at 100% 50%, rgba(232,117,26,0.10), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Secondary side glow — cooler accent from left */
.phone-screen-glow-left {
  position: absolute;
  top: 55%;
  left: 0;
  width: 100px;
  height: 250px;
  background: radial-gradient(ellipse at 0% 50%, rgba(150,45,34,0.08), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ═══════════════════════
   LAYOUT — SIDEBAR + MAIN
   ═══════════════════════ */
.app-layout {
  display: flex;
  min-height: 100vh;
}

.app-layout::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--ember-deep), var(--ember), var(--molten), var(--gauntlet-gold));
  z-index: 200;
}

.sidebar {
  width: 260px;
  min-height: 100vh;
  background: var(--obsidian);
  border-right: 1px solid var(--slate);
  padding: 32px 0;
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 6px;
  color: var(--ember);
  text-align: center;
  margin-bottom: 8px;
}

.sidebar-subtitle {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ash);
  text-align: center;
  margin-bottom: 32px;
}

.sidebar-section {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--iron);
  padding: 16px 24px 8px;
}

.sidebar-item {
  display: block;
  width: 100%;
  padding: 10px 24px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--silver);
  background: transparent;
  border: none;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s ease;
}

.sidebar-item:hover {
  color: var(--white-hot);
  background: rgba(192,57,43,0.08);
}

.sidebar-item.active {
  color: var(--ember-bright);
  background: rgba(192,57,43,0.12);
  border-right: 2px solid var(--ember);
}

.main-content {
  margin-left: 260px;
  flex: 1;
  padding: 40px;
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
  align-items: flex-start;
  justify-content: center;
  position: relative;
}

/* ═══════════════════════
   PHONE FRAME
   ═══════════════════════ */
.phone-frame {
  width: 393px;
  height: 852px;
  background: var(--void);
  border-radius: 44px;
  border: 3px solid var(--slate);
  overflow: hidden;
  position: relative;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 20px 60px rgba(0,0,0,0.3);
  flex-shrink: 0;
}

.phone-frame::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 34px;
  background: #000;
  border-radius: 0 0 20px 20px;
  z-index: 50;
}

.phone-screen {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  scrollbar-width: none;
  background: var(--void);
}

.phone-screen::-webkit-scrollbar { display: none; }

.phone-label {
  text-align: center;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--ash);
  margin-top: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ═══════════════════════
   STATUS BAR
   ═══════════════════════ */
.status-bar {
  height: 54px;
  padding: 14px 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--white-hot);
  position: relative;
  z-index: 40;
}

/* ═══════════════════════
   TAB BAR
   ═══════════════════════ */
.tab-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 84px;
  background: var(--obsidian);
  border-top: 1px solid var(--slate);
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding-top: 10px;
  z-index: 40;
}

.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.tab-icon {
  width: 24px;
  height: 24px;
}

.tab-label {
  font-family: 'Outfit', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--ash);
}

.tab-item.active .tab-label { color: var(--ember); }

/* ═══════════════════════
   COMMON COMPONENTS
   ═══════════════════════ */

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 28px;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-primary { background: var(--ember); color: var(--pure); }
.btn-primary:hover { background: var(--ember-bright); }
.btn-ghost {
  background: rgba(192,57,43,0.12);
  color: var(--ember-bright);
  border: 1.5px solid rgba(192,57,43,0.25);
}
.btn-secondary {
  background: transparent;
  color: var(--mist);
  border: 1.5px solid var(--iron);
}
.btn-success { background: var(--success); color: var(--pure); }
.btn-disabled { background: var(--graphite); color: var(--iron); cursor: not-allowed; }

/* Cards */
.card {
  background: var(--charcoal);
  border: 1px solid var(--slate);
  border-radius: 14px;
  padding: 20px;
}

/* Input */
.input-field {
  width: 100%;
  padding: 14px 16px;
  background: var(--graphite);
  border: 1px solid var(--slate);
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  color: var(--white-hot);
}

/* Stat number */
.stat-number {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 2px;
}

/* Section title */
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Progress bar */
.progress-track {
  height: 4px;
  background: var(--slate);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--ember-deep), var(--ember), var(--molten));
  border-radius: 2px;
}

/* Rank badge */
.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1px;
}

/* Gauntlet Heat gradient bar */
.gauntlet-heat-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--ember-deep), var(--ember), var(--molten), var(--gauntlet-gold));
}

/* Avatar */
.avatar {
  border-radius: 50%;
  background: var(--graphite);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  color: var(--silver);
}

/* Pill / Tag */
.pill {
  display: inline-flex;
  padding: 6px 14px;
  border-radius: 20px;
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* ═══════════════════════
   COMPONENT LIBRARY PAGE
   ═══════════════════════ */
.component-page {
  max-width: 1200px;
  margin: 0 auto;
}

.component-section {
  margin-bottom: 48px;
}

.component-section h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 4px;
  color: var(--white-hot);
  margin-bottom: 8px;
  position: relative;
  display: inline-block;
}

.component-section h2::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, var(--ember), var(--molten));
  border-radius: 1px;
}

.component-section h3 {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ash);
  margin-bottom: 20px;
}

.swatch-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}

.swatch {
  border-radius: 10px;
  overflow: hidden;
}

.swatch-color {
  height: 64px;
  border-radius: 10px 10px 0 0;
}

.swatch-info {
  padding: 8px 10px;
  background: var(--charcoal);
  border: 1px solid var(--slate);
  border-top: none;
  border-radius: 0 0 10px 10px;
}

.swatch-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--white-hot);
}

.swatch-hex {
  font-size: 10px;
  color: var(--ash);
  font-family: monospace;
}

.type-sample {
  margin-bottom: 16px;
}

.btn-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.rank-badge-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  align-items: center;
}

/* Shareable card wrapper */
.share-card {
  border-radius: 14px;
  overflow: hidden;
  position: relative;
}

/* ═══════════════════════
   SCROLLABLE AREA PADDING
   ═══════════════════════ */
.screen-content {
  padding: 0 20px 100px;
}

.screen-header {
  padding: 8px 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.screen-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--white-hot);
}
</style>
</head>

<div id="root"></div>

const RankGradient = ({rank, children, style = {}}) => {
  const gradients = {
    bronze: 'linear-gradient(135deg, #5C3D2E, #8B6A4E, #A88060)',
    silver: 'linear-gradient(135deg, #5A6A78, #8C9BAA, #B8C8D4)',
    gold: 'linear-gradient(135deg, #8B6914, #C8A84E, #E8D48A)',
    platinum: 'linear-gradient(135deg, #4A8AAA, #7BB8D4, #AAD4EA)',
    diamond: 'linear-gradient(135deg, #6A9FCC, #B8D4F0, #E8F0FF)',
    titanium: 'linear-gradient(135deg, #2A2A34, #5A5A6A, #7A7A8A)',
    obsidian: 'linear-gradient(135deg, #1A0A08, #3A1510, #962D22)',
  };
  const glow = rank === 'obsidian' ? '0 0 24px rgba(192,57,43,0.4)' :
               rank === 'diamond' ? '0 0 16px rgba(184,212,240,0.3)' :
               rank === 'gold' ? '0 0 14px rgba(200,168,78,0.25)' : 'none';
  return <span style={{background: gradients[rank], WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', boxShadow: glow, ...style}}>{children}</span>;
};

const RankBadge = ({rank, size = 48, tier = ''}) => {
  const gradients = {
    bronze: 'linear-gradient(135deg, #5C3D2E, #8B6A4E, #A88060)',
    silver: 'linear-gradient(135deg, #5A6A78, #8C9BAA, #B8C8D4)',
    gold: 'linear-gradient(135deg, #8B6914, #C8A84E, #E8D48A)',
    platinum: 'linear-gradient(135deg, #4A8AAA, #7BB8D4, #AAD4EA)',
    diamond: 'linear-gradient(135deg, #6A9FCC, #B8D4F0, #E8F0FF)',
    titanium: 'linear-gradient(135deg, #2A2A34, #5A5A6A, #7A7A8A)',
    obsidian: 'linear-gradient(135deg, #1A0A08, #3A1510, #962D22)',
  };
  const textColors = {
    bronze: '#A88060', silver: '#B8C8D4', gold: '#E8D48A', platinum: '#AAD4EA',
    diamond: '#E8F0FF', titanium: '#7A7A8A', obsidian: '#E74C3C',
  };
  const glow = rank === 'obsidian' ? '0 0 24px rgba(192,57,43,0.4)' :
               rank === 'diamond' ? '0 0 16px rgba(184,212,240,0.2)' :
               rank === 'gold' ? '0 0 12px rgba(200,168,78,0.2)' : 'none';

  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: gradients[rank], display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: glow, border: `2px solid ${textColors[rank]}33`,
    }}>
      <span style={{
        fontFamily: "'Bebas Neue', sans-serif", fontSize: size * 0.35,
        color: textColors[rank], letterSpacing: 1,
      }}>
        {rank === 'obsidian' ? 'O' : rank.charAt(0).toUpperCase()}{tier}
      </span>
    </div>
  );
};

const WeeklyMileageChart = () => {
  const data = [3.2, 5.1, 0, 4.8, 6.2, 2.1, 5.7];
  const days = ['M','T','W','T','F','S','S'];
  const max = Math.max(...data);
  return (
    <svg width="100%" height="140" viewBox="0 0 310 140">
      <defs>
        <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#E8751A"/>
          <stop offset="100%" stopColor="#962D22"/>
        </linearGradient>
      </defs>
      {data.map((v, i) => {
        const barH = max > 0 ? (v / max) * 90 : 0;
        const x = i * 44 + 4;
        return (
          <g key={i}>
            <rect x={x} y={100 - barH} width="32" height={barH} rx="4" fill={v === 0 ? 'var(--slate)' : 'url(#barGrad)'} opacity={v === 0 ? 0.3 : 1}/>
            <text x={x + 16} y={96 - barH} textAnchor="middle" fill="var(--silver)" fontSize="10" fontFamily="Bebas Neue" letterSpacing="1">{v > 0 ? v.toFixed(1) : ''}</text>
            <text x={x + 16} y={128} textAnchor="middle" fill="var(--ash)" fontSize="10" fontFamily="Outfit" fontWeight="600">{days[i]}</text>
          </g>
        );
      })}
    </svg>
  );
};

const SportBreakdownChart = () => {
  const sports = [{name:'Running',pct:45,color:'#C0392B'},{name:'Cycling',pct:25,color:'#E8751A'},{name:'Walking',pct:20,color:'#C9982A'},{name:'Swimming',pct:10,color:'#6888A8'}];
  let offset = 0;
  const r = 40;
  const c = 2 * Math.PI * r;
  return (
    <div style={{display:'flex',alignItems:'center',gap:20}}>
      <svg width="100" height="100" viewBox="0 0 100 100">
        {sports.map((s, i) => {
          const dashLen = (s.pct / 100) * c;
          const el = <circle key={i} cx="50" cy="50" r={r} fill="none" stroke={s.color} strokeWidth="12" strokeDasharray={`${dashLen} ${c - dashLen}`} strokeDashoffset={-offset} transform="rotate(-90 50 50)"/>;
          offset += dashLen;
          return el;
        })}
      </svg>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {sports.map(s => (
          <div key={s.name} style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:s.color}}/>
            <span style={{fontSize:11,color:'var(--silver)'}}>{s.name}</span>
            <span style={{fontSize:11,fontWeight:700,color:'var(--mist)',marginLeft:'auto'}}>{s.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
};

const ActivityHeatmap = () => {
  const weeks = 12;
  const days = 7;
  const grid = Array.from({length: weeks}, () => Array.from({length: days}, () => Math.random()));
  return (
    <svg width="100%" height="88" viewBox="0 0 310 88">

        const opacity = val < 0.15 ? 0.05 : val < 0.4 ? 0.2 : val < 0.65 ? 0.45 : val < 0.85 ? 0.7 : 1;

      }))}
    </svg>
  );
};

const RankProgressionChart = () => {
  const points = [
    {d:1,v:52},{d:3,v:55},{d:5,v:54},{d:7,v:58},{d:9,v:62},{d:11,v:60},{d:13,v:65},
    {d:15,v:63},{d:17,v:68},{d:19,v:72},{d:21,v:70},{d:23,v:74},{d:25,v:78},{d:27,v:76},{d:30,v:82}
  ];
  const w = 310, h = 140, pad = 20;
  const minV = 45, maxV = 90;
  const toX = d => pad + (d / 30) * (w - 2 * pad);
  const toY = v => h - pad - ((v - minV) / (maxV - minV)) * (h - 2 * pad);
  const pathD = points.map((p,i) => `${i===0?'M':'L'}${toX(p.d).toFixed(1)},${toY(p.v).toFixed(1)}`).join(' ');
  const areaD = pathD + ` L${toX(30)},${h-pad} L${toX(1)},${h-pad} Z`;

  // Rank thresholds
  const thresholds = [{name:'Gold',v:60,color:'#C8A84E'},{name:'Plat',v:80,color:'#7BB8D4'}];

// Radial Performance Radar
const RadarChart = () => {
  const stats = [{label:'Volume',val:0.78},{label:'Consistency',val:0.85},{label:'Competitive',val:0.72},{label:'Streak',val:0.93},{label:'Diversity',val:0.55}];
  const avgStats = [0.6, 0.65, 0.58, 0.5, 0.5]; // tier average
  const cx = 155, cy = 110, maxR = 80;
  const n = stats.length;
  const angle = (i) => (Math.PI * 2 * i / n) - Math.PI / 2;
  const toXY = (i, r) => ({x: cx + Math.cos(angle(i)) * r, y: cy + Math.sin(angle(i)) * r});

  const polyPoints = (vals) => vals.map((v, i) => {
    const p = toXY(i, v * maxR);
    return `${p.x},${p.y}`;
  }).join(' ');

  return (
    <svg width="100%" height="230" viewBox="0 0 310 230">
      <defs>
        <radialGradient id="radarGlow"><stop offset="0%" stopColor="#C0392B" stopOpacity="0.3"/><stop offset="100%" stopColor="#C0392B" stopOpacity="0"/></radialGradient>
      </defs>
      {/* Grid rings */}
      {[0.25,0.5,0.75,1].map(r => (
        <polygon key={r} points={Array.from({length:n},(_, i)=>{const p=toXY(i,r*maxR);return`${p.x},${p.y}`}).join(' ')} fill="none" stroke="var(--slate)" strokeWidth="0.5" opacity="0.5"/>
      ))}
      {/* Axis lines */}
      {stats.map((_,i)=>{const p=toXY(i,maxR);return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="var(--slate)" strokeWidth="0.5" opacity="0.3"/>})}
      {/* Tier average fill */}
      <polygon points={polyPoints(avgStats)} fill="var(--cooled-steel)" opacity="0.1" stroke="var(--cooled-steel)" strokeWidth="1" opacity="0.3"/>
      {/* User fill */}
      <polygon points={polyPoints(stats.map(s=>s.val))} fill="url(#radarGlow)" stroke="var(--ember)" strokeWidth="2"/>
      {/* Data points */}
      {stats.map((s,i) => {const p = toXY(i, s.val * maxR); return <circle key={i} cx={p.x} cy={p.y} r="4" fill="var(--ember)" stroke="var(--void)" strokeWidth="2"/>})}
      {/* Labels */}
      {stats.map((s,i)=>{const p=toXY(i,maxR+18);return <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fill="var(--silver)" fontSize="10" fontFamily="Outfit" fontWeight="600">{s.label}</text>})}
      {/* Center score */}
      <text x={cx} y={cy-4} textAnchor="middle" fill="var(--ember)" fontSize="24" fontFamily="Bebas Neue" letterSpacing="2">82</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="var(--ash)" fontSize="8" fontFamily="Outfit">COMPOSITE</text>
    </svg>
  );
};

// Head-to-Head Comparison
const HeadToHeadChart = () => {
  const stats = [
    {label:'Total Distance',you:47.3,them:38.2,unit:'mi'},
    {label:'Win Rate',you:75,them:60,unit:'%'},
    {label:'Avg Pace',you:8.1,them:8.7,unit:'min/mi'},
    {label:'Streak',you:14,them:7,unit:'days'},
    {label:'Rank Score',you:82,them:68,unit:'pts'},
  ];
  const maxVal = (s) => Math.max(s.you, s.them);
  return (
    <svg width="100%" height="240" viewBox="0 0 310 240">
      {stats.map((s, i) => {
        const y = i * 46 + 20;
        const mid = 155;
        const barMax = 120;
        const youW = (s.you / maxVal(s)) * barMax;
        const themW = (s.them / maxVal(s)) * barMax;
        return (
          <g key={i}>
            <text x={mid} y={y-6} textAnchor="middle" fill="var(--ash)" fontSize="9" fontFamily="Outfit" fontWeight="600" textTransform="uppercase" letterSpacing="1">{s.label}</text>
            {/* Your bar (left) */}
            <rect x={mid - youW - 4} y={y} width={youW} height="18" rx="4" fill="var(--ember)" opacity="0.85"/>
            <text x={mid - youW - 10} y={y+13} textAnchor="end" fill="var(--ember-bright)" fontSize="12" fontFamily="Bebas Neue" letterSpacing="1">{s.you}{s.unit==='%'||s.unit==='pts'?'':''}</text>
            {/* Their bar (right) */}
            <rect x={mid + 4} y={y} width={themW} height="18" rx="4" fill="var(--cooled-steel)" opacity="0.6"/>
            <text x={mid + themW + 10} y={y+13} textAnchor="start" fill="var(--cooled-steel)" fontSize="12" fontFamily="Bebas Neue" letterSpacing="1">{s.them}</text>
            {/* Center divider */}
            <line x1={mid} y1={y-2} x2={mid} y2={y+20} stroke="var(--slate)" strokeWidth="1"/>
          </g>
        );
      })}
      {/* Labels */}
      <text x={40} y={10} fill="var(--ember)" fontSize="11" fontFamily="Outfit" fontWeight="700">YOU</text>
      <text x={270} y={10} fill="var(--cooled-steel)" fontSize="11" fontFamily="Outfit" fontWeight="700">ALEX M.</text>
    </svg>
  );
};

// Monthly Distance Altitude Map
const AltitudeChart = () => {
  const data = [2.1,0,3.5,4.2,1.8,5.1,3.8,0,0,4.5,6.2,3.1,5.8,4.9,2.2,6.8,5.5,0,3.2,4.1,7.2,6.1,0,5.3,4.8,3.9,6.5,5.2,4.7,7.8];
  const w = 310, h = 150, pad = 20;
  const max = Math.max(...data);
  const toX = i => pad + (i / (data.length - 1)) * (w - 2 * pad);
  const toY = v => h - pad - (v / max) * (h - 2 * pad);
  const linePts = data.map((v,i) => `${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
  const areaPts = `${toX(0)},${h-pad} ${linePts} ${toX(data.length-1)},${h-pad}`;
  const pbIdx = data.indexOf(max);

  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`}>
      <defs>
        <linearGradient id="altGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#E8751A" stopOpacity="0.5"/><stop offset="100%" stopColor="#962D22" stopOpacity="0.05"/>
        </linearGradient>
        <linearGradient id="altLine" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#962D22"/><stop offset="50%" stopColor="#C0392B"/><stop offset="100%" stopColor="#E8751A"/>
        </linearGradient>
      </defs>
      <polygon points={areaPts} fill="url(#altGrad)"/>
      <polyline points={linePts} fill="none" stroke="url(#altLine)" strokeWidth="2" strokeLinejoin="round"/>
      {/* PB marker */}
      <circle cx={toX(pbIdx)} cy={toY(max)} r="5" fill="var(--molten)" stroke="var(--void)" strokeWidth="2"/>
      <text x={toX(pbIdx)} y={toY(max)-10} textAnchor="middle" fill="var(--molten)" fontSize="10" fontFamily="Bebas Neue" letterSpacing="1">PB {max}</text>
      {/* X axis */}
      {[1,10,20,30].map(d => <text key={d} x={toX(d-1)} y={h-4} textAnchor="middle" fill="var(--ash)" fontSize="8" fontFamily="Outfit">{d}</text>)}
    </svg>
  );
};

// Weekly Pulse Ring

// Win Streak Heat Bar
const WinStreakBar = () => {
  const results = ['W','W','L','W','W','W','L','W','L','W','W','W','W','W','L','W'];
  const colors = {W: 'var(--ember)', L: 'var(--cooled-steel)'};
  let streak = 0;
  return (
    <svg width="100%" height="60" viewBox="0 0 310 60">
      {results.map((r, i) => {
        if (r === 'W') streak++; else streak = 0;
        const intensity = r === 'W' ? Math.min(0.5 + streak * 0.12, 1) : 0.4;
        const w = 310 / results.length;
        return (
          <g key={i}>
            <rect x={i * w + 1} y={10} width={w - 2} height={30} rx="3"
              fill={r === 'W' ? `rgba(192,57,43,${intensity})` : 'rgba(122,138,154,0.4)'}/>
            <text x={i * w + w/2} y={30} textAnchor="middle" fill={r === 'W' ? 'var(--pure)' : 'var(--ash)'} fontSize="9" fontFamily="Bebas Neue" letterSpacing="0.5">{r}</text>
          </g>
        );
      })}
      <text x="0" y="56" fill="var(--ash)" fontSize="8" fontFamily="Outfit">Oldest</text>
      <text x="310" y="56" textAnchor="end" fill="var(--ash)" fontSize="8" fontFamily="Outfit">Latest</text>
    </svg>
  );
};

const TierPyramid = () => {

    {name:'Bronze',pct:40,color:'#8B6A4E',grad:'linear-gradient(90deg, #5C3D2E, #8B6A4E, #A88060)'},
  ];
  return (
    <svg width="100%" height="260" viewBox="0 0 310 260">
      {tiers.map((t, i) => {
        const y = i * 35 + 10;

};

    <div className="app-layout">
      <nav className="sidebar">
        <div className="sidebar-logo">GAUNTLET</div>

        {pages.map(p => {
